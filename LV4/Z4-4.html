<!doctype html>
<html>
<head>
    <title>Z4-1</title>
    <meta charset="utf-8">
    <script src="http://d3js.org/d3.v3.min.js"></script>
</head>
<body>

<style>
.node circle { fill: #fff; stroke: steelblue; stroke-width: 1.5px; cursor: pointer; }
.node circle.collapsed { fill: steelblue; }
.node { font: 10px sans-serif; }
.link { fill: none; stroke: #ccc; stroke-width: 1.5px; }
</style>
<div id="tree-container"></div>
<script>
var data = {
  "name": "flare",
  "children": [
    {
      "name": "analytics",
      "children": [
        {
          "name": "cluster",
          "children": [
            {"name": "AgglomerativeCluster", "size": 3938},
            {"name": "CommunityStructure", "size": 3812},
            {"name": "MergeEdge", "size": 743}
          ]
        },
        {
          "name": "graph",
          "children": [
            {"name": "BetweennessCentrality", "size": 3534},
            {"name": "LinkDistance", "size": 5731}
          ]
        }
      ]
    }
  ]
};

var width = 580, height = 400;

var cluster = d3.layout.cluster().size([height - 60, width - 200]);
var diagonal = d3.svg.diagonal().projection(function(d) { return [d.y, d.x]; });

var svg = d3.select("#tree-container").append("svg")
  .attr("width", width)
  .attr("height", height)
  .append("g")
  .attr("transform", "translate(40,30)");

function update(source) {
  var nodes = cluster.nodes(data);
  var links = cluster.links(nodes);

  svg.selectAll(".link").remove();
  svg.selectAll(".node").remove();

  svg.selectAll(".link")
    .data(links)
    .enter().append("path")
    .attr("class", "link")
    .attr("d", diagonal);

  var node = svg.selectAll(".node")
    .data(nodes)
    .enter().append("g")
    .attr("class", "node")
    .attr("transform", function(d) { return "translate(" + d.y + "," + d.x + ")"; })
    .on("click", function(d) {
      if (!d._children && (!d.children || d.children.length === 0)) return;
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else {
        d.children = d._children;
        d._children = null;
      }
      update(d);
    });

  node.append("circle")
    .attr("r", 5)
    .attr("class", function(d) { return d._children ? "collapsed" : ""; });

  node.append("text")
    .attr("dx", function(d) { return d.children || d._children ? -8 : 8; })
    .attr("dy", 3)
    .style("text-anchor", function(d) { return d.children || d._children ? "end" : "start"; })
    .text(function(d) { return d.name; });
}

update(data);
</script>
</body>
</html>
