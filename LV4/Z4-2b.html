<!doctype html>
<html>
<head>
    <title>Z4-2b</title>
    <meta charset="utf-8">
    <script src="http://d3js.org/d3.v3.min.js"></script>
</head>
<body>
<script>
var width = 600;
var height = 600;
var outerRadius = 200;
var innerRadius = 0;

var color = d3.scale.category20();

var arc = d3.svg.arc()
.innerRadius(innerRadius)
.outerRadius(outerRadius);

var data = [
{name: 'jabuka', value: 17},
{name: 'kruska', value: 4},
{name: 'banana', value: 83},
{name: 'jagoda', value: 47},
{name: 'ribizla', value: 1}
];

var pie = d3.layout.pie()
.value(function(d) { return d.value; });

var svg = d3.select("body")
.append("svg")
.attr("width", width)
.attr("height", height);

var pieArcs = svg.selectAll("g.pie")
.data(pie(data))
.enter()
.append("g")
.attr("class", "pie")
.attr("transform", "translate(" + (width / 2) + ", " + (height / 2) +")");

pieArcs.append("path")
.attr("fill", function(d, i) { return color(i); })
.attr("d", arc);

pieArcs.append("text")
.attr("transform", function(d) {
    var midAngle = (d.startAngle + d.endAngle) / 2;
    var pos = arc.centroid(d);
    var rotation = midAngle * 180 / Math.PI + 90;
    
    if (midAngle > Math.PI / 2 && midAngle < 2 * Math.PI / 2) {
        rotation += 180;
    }
    
    return "translate(" + pos + ") rotate(" + rotation + ")";
})
.attr("text-anchor", "middle")
.attr("dy", "0.35em")
.text(function(d) { return d.data.name + " (" + d.value + ")"; });

</script>
</body>
</html>
