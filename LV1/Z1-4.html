<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
    <script>
        const svg = d3.select("body")
            .append("svg")
            .attr("width", 1000)
            .attr("height", 1000);

        svg.append("rect")
            .attr("x", 10)
            .attr("y", 10)
            .attr("width", 100)
            .attr("height", 600)
            .style("fill", "yellow")
            .style("fill-opacity", 0.5)
            .style("stroke", "black")
            .style("stroke-width", 5)
            .style("stroke-opacity", 1.0);
    </script>
</body>
</html>
