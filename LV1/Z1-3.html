<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
    <script>
        d3.select("body")
            .append("h1")
            .text("Vizualizacija podataka LV1");

        const div1 = d3.select("body")
            .append("div")
            .attr("id", () => `ID1`);

        div1.append("h2")
            .text("Podnaslov 1");

        div1.append("p")
            .text("Tekst 1.");

        const div2 = d3.select("body")
            .append("div")
            .attr("id", () => `ID2`);

        div2.append("h2")
            .text("Podnaslov 2");

        div2.append("p")
            .text("Tekst 2.");

        const data = d3.range(1, 11).map(i => ({id: i}));

        d3.select("body").selectAll("div")
            .data(data)
            .enter()
            .append("div")
            .attr("id", d => `ID${d.id}`)
            .each(function(d) {
                d3.select(this)
                    .append("h2")
                    .text(`Podnaslov ${d.id}`);

                d3.select(this)
                    .append("p")
                    .text(`Tekst ${d.id}.`);
            });

        d3.select("#ID1 p").text("Novi proizvoljni tekst 1!");
        d3.select("#ID2 p").text("Novi proizvoljni tekst 2!");
    </script>
</body>
</html>
