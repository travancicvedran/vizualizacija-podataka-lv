<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
    <script>
        const svg = d3.select("body")
            .append("svg")
            .attr("width", 1000)
            .attr("height", 1000);

        // Nebo
        svg.append("rect")
            .attr("x", 0).attr("y", 0)
            .attr("width", 600).attr("height", 250)
            .attr("fill", "skyblue");

        // Trava
        svg.append("rect")
            .attr("x", 0).attr("y", 250)
            .attr("width", 600).attr("height", 150)
            .attr("fill", "green");

        // Sunce
        svg.append("circle")
            .attr("cx", 80).attr("cy", 70)
            .attr("r", 35)
            .attr("fill", "yellow");

+       // Prvi oblak
        svg.append("ellipse")
            .attr("cx", 400).attr("cy", 60)
            .attr("rx", 40).attr("ry", 20)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 380).attr("cy", 50)
            .attr("r", 25)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 420).attr("cy", 45)
            .attr("r", 28)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 440).attr("cy", 55)
            .attr("r", 22)
            .attr("fill", "white");

        // Drugi oblak
        svg.append("ellipse")
            .attr("cx", 500).attr("cy", 100)
            .attr("rx", 35).attr("ry", 18)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 480).attr("cy", 90)
            .attr("r", 22)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 515).attr("cy", 85)
            .attr("r", 25)
            .attr("fill", "white");
        svg.append("circle")
            .attr("cx", 540).attr("cy", 95)
            .attr("r", 20)
            .attr("fill", "white");

        // Kuća
        svg.append("rect")
            .attr("x", 200).attr("y", 150)
            .attr("width", 200).attr("height", 150)
            .attr("fill", "peru")
            .attr("stroke-width", 2);

        // Krov
        svg.append("polygon")
            .attr("points", "180,150 420,150 300,70")
            .attr("fill", "firebrick")
            .attr("stroke-width", 2);

        // Vrata
        svg.append("rect")
            .attr("x", 275).attr("y", 220)
            .attr("width", 50).attr("height", 80)
            .attr("fill", "saddlebrown")
            .attr("stroke", "black")
            .attr("stroke-width", 2);

        // Kvaka
        svg.append("circle")
            .attr("cx", 315).attr("cy", 260)
            .attr("r", 4)
            .attr("fill", "gold");

        // Lijevi prozor
        svg.append("rect")
            .attr("x", 220).attr("y", 180)
            .attr("width", 40).attr("height", 40)
            .attr("fill", "lightblue")
            .attr("stroke", "black")
            .attr("stroke-width", 2);

        // Desni prozor
        svg.append("rect")
            .attr("x", 340).attr("y", 180)
            .attr("width", 40).attr("height", 40)
            .attr("fill", "lightblue")
            .attr("stroke", "black")
            .attr("stroke-width", 2);
    </script>
</body>
</html>
