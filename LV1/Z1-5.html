<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VP-LV</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
    <script>
        const svg = d3.select("body")
            .append("svg")
            .attr("width", 1000)
            .attr("height", 1000);
        
        const rings = [
            { cx: 150, cy: 100, r: 45, color: 'blue' },
            { cx: 200, cy: 150, r: 45, color: 'gold' },
            { cx: 250, cy: 100, r: 45, color: 'black' },
            { cx: 300, cy: 150, r: 45, color: 'green' },
            { cx: 350, cy: 100, r: 45, color: 'red' } 
        ];

        svg.selectAll("circle")
            .data(rings)
            .enter()
            .append("circle")
            .attr("cx", function(d) {
                return d.cx;
            })
            .attr("cy", function(d) {
                return d.cy;
            })
            .attr("r", function(d) {
                return d.r;
            })
            .attr("fill", "none")        
            .attr("stroke", function(d) {
                return d.color;
            })
            .attr("stroke-width", 6);    

    </script>
</body>
</html>
